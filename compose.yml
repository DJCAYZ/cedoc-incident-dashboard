services:
  db:
    image: postgres:18.4
    shm_size: 128mb
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: CEDOC_dashboard
      POSTGRES_DB: CEDOC_dashboard
  
  adminer:
    image: adminer
    ports:
      - 8080:8080

volumes:
  db_data: